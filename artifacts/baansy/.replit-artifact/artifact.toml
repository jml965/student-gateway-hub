kind = "web"
previewPath = "/"
title = "Baansy — منصة التسجيل الجامعي الذكية"
version = "1.0.0"
id = "artifacts/baansy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24037

[services.development]
run = "pnpm --filter @workspace/baansy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/baansy", "run", "build" ]
publicDir = "artifacts/baansy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24037"
BASE_PATH = "/"
