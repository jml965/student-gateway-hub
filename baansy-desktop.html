    function AuthInput({ label, type="text", placeholder, value, onChange, icon:Ic, rightSlot, error, lang, theme }) {

      const textMuted= isDark?"#94a3b8":"#64748b";

      const [focused, setFocused] = useState(false);
      const borderCol = error?"#ef4444": focused?"#2563eb": isDark?"#334155":"#cbd5e1";
      return (
        <div style={{marginBottom:16}}>
          <label style={{display:"block",fontSize:13,fontWeight:600,color:textMain,marginBottom:6}}>{label}</label>
          <div style={{display:"flex",alignItems:"center",backgroundColor:inputBg,border:`1.5px solid ${borderCol}`,borderRadius:12,padding:"0 14px",gap:10,transition:"border-color .15s",boxShadow:focused?`0 0 0 3px ${error?"#ef444420":"#2563eb18"}`:"none"}}>
            {Ic && <Ic size={16} color={focused?"#2563eb":textMuted}/>}
            <input type={type} placeholder={placeholder} value={value} onChange={onChange}
              onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}
              style={{flex:1,border:"none",backgroundColor:"transparent",color:textMain,fontFamily:tx.font,fontSize:14,padding:"13px 0",direction:tx.dir,textAlign:lang==="ar"?"right":"left"}}/>

                    <div style={{display:"flex",gap:6}}>
                      <div style={{flex:1,backgroundColor:accentBlueSoft,borderRadius:8,padding:"9px 10px",display:"flex",alignItems:"center",gap:7,border:`1px solid ${isDark?"#1d4ed830":"#bfdbfe"}`}}>
                        <User size={13} color={accentBlueText}/><span style={{fontSize:12,fontWeight:600,color:accentBlueText}}>{tx.loggedInAs}</span>
                      </div>
                      <button onClick={()=>setIsLoggedIn(false)} style={{backgroundColor:isDark?"#2d1515":"#fff1f2",color:isDark?"#f87171":"#dc2626",border:"none",borderRadius:8,padding:"9px 10px",cursor:"pointer",display:"flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,fontFamily:tx.font}}>
                        <LogOut size={13}/>{tx.logoutBtn}
                      </button>
                    </div>
                  ):(
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>{setDrawerOpen(false);navigate("login");}} style={{flex:1,backgroundColor:ctrlBg,color:ctrlColor,border:"none",borderRadius:8,padding:"9px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,fontSize:12,fontFamily:tx.font}}>
                        <LogIn size={13}/>{tx.loginBtn}
                      </button>
                      <button onClick={()=>{setDrawerOpen(false);navigate("signup");}} style={{flex:1,background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",color:"#fff",border:"none",borderRadius:8,padding:"9px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,fontSize:12,fontWeight:600,fontFamily:tx.font,boxShadow:"0 2px 6px rgba(37,99,235,.3)"}}>
                        <UserPlus size={13}/>{tx.signupBtn}
                      </button>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* Top bar */}
          <div style={{backgroundColor:topBg,borderBottom:`1px solid ${topBorder}`,flexShrink:0,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",direction:"ltr"}}>
            {/* Stats */}
            <div style={{display:"flex",gap:6}}>
              {[tx.stat1,tx.stat2].map((s,i)=>(
                <div key={i} style={{backgroundColor:accentBlueSoft,border:`1px solid ${isDark?"#1d4ed830":"#bfdbfe"}`,borderRadius:8,padding:"4px 8px",fontSize:9.5,fontWeight:600,color:accentBlueText,whiteSpace:"nowrap",fontFamily:tx.font}}>{s}</div>
              ))}
            </div>
            {/* Logo + Hamburger */}
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:800,color:textMain,fontFamily:tx.font}}>Baansy</div>
                <div style={{fontSize:8,color:textMuted,fontFamily:tx.font,whiteSpace:"nowrap"}}>{tx.tagline}</div>
              </div>
              <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center"}}><GraduationCap size={17} color="#fff"/></div>
              <button onClick={()=>setDrawerOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:textMuted,padding:4,display:"flex",alignItems:"center"}}>
                <Menu size={22} color={textMain}/>
              </button>
            </div>
          </div>

          {/* Scrollable content */}
          <div style={{flex:1,overflowY:"auto",padding:"20px 14px 10px",display:"flex",flexDirection:"column",alignItems:"center"}}>
            {/* Welcome */}
            <div style={{width:"100%",textAlign:"center",marginBottom:18}}>
              <div style={{width:52,height:52,borderRadius:16,background:"linear-gradient(135deg,#1d4ed8,#60a5fa)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px",boxShadow:"0 6px 20px rgba(37,99,235,.35)"}}><GraduationCap size={24} color="#fff"/></div>
              <h1 style={{fontSize:20,fontWeight:800,margin:"0 0 6px",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",lineHeight:1.3}}>{tx.welcomeTitle}</h1>
              <p style={{fontSize:12,color:textMuted,margin:0}}>{tx.welcomeSub} <strong style={{color:accentBlue}}>19,000+</strong> {tx.welcomeSub2}</p>
            </div>
            {/* Assistant label */}
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:12,fontSize:11,color:textMuted,fontWeight:500,width:"100%",justifyContent:isAr?"flex-end":"flex-start"}}>
              <Sparkles size={12} color={accentBlue}/>{tx.assistantLabel}
            </div>
            {/* Services label */}
            <div style={{width:"100%",marginBottom:10}}><p style={{fontSize:12,fontWeight:600,color:textMuted,margin:0,textAlign:isAr?"right":"left"}}>{tx.servicesLabel}</p></div>

            {/* Carousel */}
            <div style={{width:"100%",position:"relative"}}>
              <div ref={carouselRef} onScroll={handleScroll}
                style={{display:"flex",overflowX:"auto",scrollSnapType:"x mandatory",scrollBehavior:"smooth",width:"100%",scrollbarWidth:"none",msOverflowStyle:"none"}}>
                {groups.map((group,gi)=>(
                  <div key={gi} style={{minWidth:"100%",scrollSnapAlign:"start",display:"grid",gridTemplateColumns:"1fr 1fr",gridTemplateRows:"auto auto",gap:8,padding:"2px 1px 4px",boxSizing:"border-box"}}>
                    {group.map((svc,si)=>{
                      const Ic=svc.icon;
                      return (
                        <div key={si} style={{backgroundColor:cardBg,border:`1.5px solid ${cardBorder}`,borderRadius:14,padding:"11px 10px",cursor:"pointer",display:"flex",flexDirection:"row",alignItems:"center",gap:9,boxShadow:isDark?"0 2px 10px rgba(0,0,0,.28)":"0 2px 8px rgba(37,99,235,.07)",transition:"border-color .15s",direction:tx.dir,minWidth:0}}
                          onMouseEnter={e=>{e.currentTarget.style.borderColor=accentBlue;}}
                          onMouseLeave={e=>{e.currentTarget.style.borderColor=cardBorder;}}>
                          <div style={{width:36,height:36,borderRadius:10,flexShrink:0,background:isDark?"linear-gradient(135deg,#1e3a8a,#2563eb)":"linear-gradient(135deg,#dbeafe,#bfdbfe)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                            <Ic size={17} color={isDark?"#93c5fd":"#1d4ed8"}/>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{fontSize:11,fontWeight:700,color:textMain,lineHeight:1.3,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{svc.label}</div>
                            <div style={{fontSize:9.5,color:textMuted,lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{svc.desc}</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
              {/* Nav */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:12}}>
                <button onClick={()=>goToSlide(isAr?slideIndex+1:slideIndex-1)} disabled={isAr?slideIndex>=totalSlides-1:slideIndex<=0}
                  style={{width:28,height:28,borderRadius:8,backgroundColor:(isAr?slideIndex>=totalSlides-1:slideIndex<=0)?isDark?"#1a2332":"#f1f5f9":ctrlBg,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:(isAr?slideIndex>=totalSlides-1:slideIndex<=0)?textMuted:ctrlColor}}>
                  {isAr?<ChevR size={14}/>:<ChevL size={14}/>}
                </button>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {groups.map((_,i)=>(
                    <button key={i} onClick={()=>goToSlide(i)} style={{width:slideIndex===i?18:7,height:7,borderRadius:4,border:"none",cursor:"pointer",padding:0,backgroundColor:slideIndex===i?accentBlue:isDark?"#334155":"#cbd5e1",transition:"all .2s"}}/>
                  ))}
                </div>
                <button onClick={()=>goToSlide(isAr?slideIndex-1:slideIndex+1)} disabled={isAr?slideIndex<=0:slideIndex>=totalSlides-1}
                  style={{width:28,height:28,borderRadius:8,backgroundColor:(isAr?slideIndex<=0:slideIndex>=totalSlides-1)?isDark?"#1a2332":"#f1f5f9":ctrlBg,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:(isAr?slideIndex<=0:slideIndex>=totalSlides-1)?textMuted:ctrlColor}}>
                  {isAr?<ChevL size={14}/>:<ChevR size={14}/>}
                </button>
              </div>
            </div>
          </div>

          {/* Input */}
          <div style={{padding:"10px 14px 8px",borderTop:`1px solid ${isDark?"#1e293b":"#e2e8f0"}`,backgroundColor:isDark?"#0d1117":"#fff",flexShrink:0}}>
            <div style={{backgroundColor:inputBg,border:`1.5px solid ${inputBorder}`,borderRadius:14,display:"flex",alignItems:"center",gap:8,padding:"9px 12px",boxShadow:isDark?"0 0 0 1px #334155":"0 2px 8px rgba(0,0,0,.08)"}}>
              <input type="text" placeholder={tx.inputPH} value={inputVal} onChange={e=>setInputVal(e.target.value)} style={{flex:1,border:"none",backgroundColor:"transparent",color:textMain,fontFamily:tx.font,fontSize:13,direction:tx.dir,textAlign:isAr?"right":"left"}}/>
              <button style={{width:34,height:34,borderRadius:10,flexShrink:0,border:"none",background:inputVal.length>0?"linear-gradient(135deg,#1d4ed8,#3b82f6)":isDark?"#1e293b":"#f1f5f9",cursor:inputVal.length>0?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Send size={15} color={inputVal.length>0?"#fff":textMuted} style={{transform:isAr?"rotate(180deg)":"none"}}/>
              </button>
            </div>
            <p style={{textAlign:"center",fontSize:9,color:textMuted,marginTop:6,marginBottom:0}}>{tx.disclaimer}</p>
          </div>
        </div>
      );
    }

    /* ══════════════════════ APP ROUTER ══════════════════════ */
    function App() {
      const [page,setPage]=useState("home");
      const [lang,setLang]=useState("ar");
      const [theme,setTheme]=useState("light");
      const [isLoggedIn,setIsLoggedIn]=useState(false);
      const [isMobile,setIsMobile]=useState(window.innerWidth<768);

      useEffect(()=>{
        const onResize=()=>setIsMobile(window.innerWidth<768);
        window.addEventListener("resize",onResize);
        return ()=>window.removeEventListener("resize",onResize);
      },[]);

      const navigate=(p)=>setPage(p);
      const onLogin=()=>{setIsLoggedIn(true);setPage("home");};
      const onSignup=()=>{setIsLoggedIn(true);setPage("home");};

      const shared={lang,setLang,theme,setTheme,navigate};

      if(page==="login")   return <LoginPage  {...shared} onLogin={onLogin}/>;
      if(page==="signup")  return <SignupPage  {...shared} onSignup={onSignup}/>;
      if(page==="forgot")  return <ForgotPage  {...shared}/>;
      if(page==="referral") return isMobile
        ? <ReferralMobile  {...shared}/>
        : <ReferralDesktop {...shared}/>;

      return isMobile
        ? <HomepageMobile  {...shared} isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn}/>
        : <HomepageDesktop {...shared} isLoggedIn={isLoggedIn} setIsLoggedIn={setIsLoggedIn}/>;
    }

    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
