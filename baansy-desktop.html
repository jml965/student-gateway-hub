<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baansy — منصة التسجيل الجامعي الذكية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Cairo', 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    /* ── Inline SVG icon system (no external deps) ── */
    function Icon({ size = 24, color = "currentColor", style, children }) {
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
          viewBox="0 0 24 24" fill="none" stroke={color}
          strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
          {children}
        </svg>
      );
    }
    const GraduationCap = (p) => <Icon {...p}>
      <path d="M22 10v6"/><path d="M2 10l10-5 10 5-10 5z"/>
      <path d="M6 12v5c3 3 9 3 12 0v-5"/>
    </Icon>;
    const Home = (p) => <Icon {...p}>
      <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </Icon>;
    const Heart = (p) => <Icon {...p}>
      <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
    </Icon>;
    const Plane = (p) => <Icon {...p}>
      <path d="M17.8 19.2 16 11l3.5-3.5C21 6 21 4 19 4s-2 2-3.5 3.5L8 11 .8 17.2a.8.8 0 0 0 0 1.1L2 19.5l4.5-2.5 3.5 3.5-2.5 4.5 1.1 1.1c.3.3.8.3 1.1 0L17.8 19.2z"/>
    </Icon>;
    const FileText = (p) => <Icon {...p}>
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
      <path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>
    </Icon>;
    const CreditCard = (p) => <Icon {...p}>
      <rect width="22" height="16" x="1" y="4" rx="2" ry="2"/>
      <line x1="1" x2="23" y1="10" y2="10"/>
    </Icon>;
    const IdCard = (p) => <Icon {...p}>
      <rect width="20" height="14" x="2" y="5" rx="2"/>
      <circle cx="8" cy="12" r="2"/>
      <path d="M14 9h4"/><path d="M14 13h2"/>
    </Icon>;
    const MessageSquarePlus = (p) => <Icon {...p}>
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      <line x1="9" x2="15" y1="10" y2="10"/>
      <line x1="12" x2="12" y1="7" y2="13"/>
    </Icon>;
    const Moon = (p) => <Icon {...p}>
      <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
    </Icon>;
    const Sun = (p) => <Icon {...p}>
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2v2"/><path d="M12 20v2"/>
      <path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>
      <path d="M2 12h2"/><path d="M20 12h2"/>
      <path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
    </Icon>;
    const Globe = (p) => <Icon {...p}>
      <circle cx="12" cy="12" r="10"/>
      <line x1="2" x2="22" y1="12" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </Icon>;
    const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
    const ChevronLeft  = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const PanelLeftClose = (p) => <Icon {...p}>
      <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
      <path d="M9 3v18"/><path d="m16 15-3-3 3-3"/>
    </Icon>;
    const PanelLeftOpen = (p) => <Icon {...p}>
      <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
      <path d="M9 3v18"/><path d="m14 9 3 3-3 3"/>
    </Icon>;
    const Send = (p) => <Icon {...p}>
      <path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>
    </Icon>;
    const MoreHorizontal = (p) => <Icon {...p}>
      <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
    </Icon>;
    const Settings = (p) => <Icon {...p}>
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </Icon>;
    const LogOut = (p) => <Icon {...p}>
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" x2="9" y1="12" y2="12"/>
    </Icon>;
    const LogIn = (p) => <Icon {...p}>
      <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
      <polyline points="10 17 15 12 10 7"/>
      <line x1="15" x2="3" y1="12" y2="12"/>
    </Icon>;
    const UserPlus = (p) => <Icon {...p}>
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <line x1="19" x2="19" y1="8" y2="14"/>
      <line x1="22" x2="16" y1="11" y2="11"/>
    </Icon>;
    const User = (p) => <Icon {...p}>
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </Icon>;

    /* ── Translations ── */
    const t = {
      ar: {
        dir: "rtl", font: "'Cairo','Inter',sans-serif",
        logo: "Baansy", tagline: "منصة التسجيل الجامعي الذكية",
        newChat: "+ محادثة جديدة", todayLabel: "اليوم",
        history: ["هل يوجد غيرهم", "مرحباً", "استفسار عن الفيزا"],
        assistantLabel: "مساعد Baansy الذكي",
        welcomeTitle: "مرحباً بك في Baansy",
        welcomeSub: "منصتك الذكية للتسجيل في أكثر من",
        welcomeSub2: "جامعة حول العالم",
        inputPlaceholder: "اكتب رسالتك...",
        servicesLabel: "كيف يمكنني مساعدتك؟",
        services: [
          { icon: GraduationCap, label: "تسجيل الجامعات",          desc: "4000+ جامعة خاصة و15000+ حكومية" },
          { icon: Home,          label: "السكن الطلابي",            desc: "إيجاد سكن قريب من جامعتك" },
          { icon: Heart,         label: "التأمين الصحي",            desc: "تغطية طبية شاملة للطلاب" },
          { icon: Plane,         label: "استقبال من المطار",        desc: "خدمة النقل وحجز التذاكر" },
          { icon: FileText,      label: "تجهيز الفيزا",             desc: "مساعدة كاملة في ملف الفيزا" },
          { icon: IdCard,        label: "البطاقة الطلابية الدولية", desc: "خصومات حصرية حول العالم" },
          { icon: CreditCard,    label: "كارت فيزا / ماستركارد",   desc: "بطاقة مسبقة الدفع للطلاب" },
        ],
        disclaimer: "قد يقدم Baansy AI معلومات غير دقيقة · إشعار الخصوصية",
        switchLang: "EN", loginBtn: "تسجيل الدخول", signupBtn: "إنشاء حساب",
        settingsBtn: "الإعدادات", logoutBtn: "تسجيل الخروج", loggedInAs: "مرحباً، أحمد",
        themeLight: "فاتح", themeDark: "داكن",
        collapseTip: "طي القائمة", expandTip: "عرض القائمة",
      },
      en: {
        dir: "ltr", font: "'Inter',sans-serif",
        logo: "Baansy", tagline: "Smart University Registration Platform",
        newChat: "+ New Chat", todayLabel: "Today",
        history: ["Are there others?", "Hello", "Visa inquiry"],
        assistantLabel: "Baansy AI Assistant",
        welcomeTitle: "Welcome to Baansy",
        welcomeSub: "Your smart platform for registering in over",
        welcomeSub2: "universities worldwide",
        inputPlaceholder: "Type your message...",
        servicesLabel: "How can I help you today?",
        services: [
          { icon: GraduationCap, label: "University Registration",        desc: "4,000+ private & 15,000+ public" },
          { icon: Home,          label: "Student Housing",                 desc: "Find housing near your university" },
          { icon: Heart,         label: "Health Insurance",                desc: "Comprehensive student medical coverage" },
          { icon: Plane,         label: "Airport Pickup",                  desc: "Transfer services & ticket booking" },
          { icon: FileText,      label: "Visa Assistance",                 desc: "Complete help with student visa files" },
          { icon: IdCard,        label: "International Student Card",      desc: "Exclusive discounts worldwide" },
          { icon: CreditCard,    label: "Visa / Mastercard",               desc: "Prepaid card for students" },
        ],
        disclaimer: "Baansy AI may provide inaccurate information · Privacy Notice",
        switchLang: "عر", loginBtn: "Login", signupBtn: "Sign Up",
        settingsBtn: "Settings", logoutBtn: "Logout", loggedInAs: "Hi, Ahmed",
        themeLight: "Light", themeDark: "Dark",
        collapseTip: "Collapse sidebar", expandTip: "Expand sidebar",
      },
    };

    /* ── Main component ── */
    function Homepage() {
      const [lang, setLang]           = useState("ar");
      const [theme, setTheme]         = useState("light");
      const [inputVal, setInputVal]   = useState("");
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [isLoggedIn, setIsLoggedIn]   = useState(false);

      const tx   = t[lang];
      const isDark = theme === "dark";

      const bg             = isDark ? "#0d1117" : "#f8faff";
      const sidebarBg      = isDark ? "#0f172a" : "#eef2ff";
      const sidebarBorder  = isDark ? "#1e293b" : "#c7d2fe";
      const textMain       = isDark ? "#f1f5f9" : "#1e293b";
      const textMuted      = isDark ? "#94a3b8" : "#64748b";
      const cardBg         = isDark ? "#1e293b" : "#ffffff";
      const cardBorder     = isDark ? "#334155" : "#e2e8f0";
      const inputBg        = isDark ? "#1e293b" : "#ffffff";
      const inputBorder    = isDark ? "#334155" : "#cbd5e1";
      const accentBlue     = "#2563eb";
      const accentBlueSoft = isDark ? "#1d4ed820" : "#eff6ff";
      const accentBlueText = isDark ? "#93c5fd" : "#1d4ed8";
      const ctrlBg         = isDark ? "#1e293b" : "#dbeafe";
      const ctrlColor      = isDark ? "#93c5fd" : "#1d4ed8";
      const historyHover   = isDark ? "#1e293b" : "#dbeafe";

      return (
        <div style={{
          display: "flex", height: "100vh", width: "100%",
          fontFamily: tx.font, direction: tx.dir,
          backgroundColor: bg, color: textMain, overflow: "hidden",
        }}>

          {/* ── SIDEBAR WRAPPER ── */}
          <div style={{ position: "relative", flexShrink: 0, order: lang === "ar" ? 1 : 0 }}>

            {/* Edge toggle tab */}
            <button
              onClick={() => setSidebarOpen(o => !o)}
              title={sidebarOpen ? tx.collapseTip : tx.expandTip}
              style={{
                position: "absolute", top: 68, right: -28,
                width: 28, height: 52, borderRadius: "0 10px 10px 0",
                backgroundColor: sidebarBg, border: `1px solid ${sidebarBorder}`,
                borderLeft: "none", color: textMuted, cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center",
                zIndex: 10, boxShadow: "2px 2px 6px rgba(0,0,0,0.08)",
                transition: "background-color 0.15s",
              }}
            >
              {sidebarOpen ? <PanelLeftClose size={15} /> : <PanelLeftOpen size={15} />}
            </button>

            {/* ── SIDEBAR ── */}
            <aside style={{
              width: sidebarOpen ? 260 : 0, minWidth: sidebarOpen ? 260 : 0,
              overflow: "hidden", backgroundColor: sidebarBg,
              borderLeft:  lang === "ar" ? "none" : `1px solid ${sidebarBorder}`,
              borderRight: lang === "ar" ? `1px solid ${sidebarBorder}` : "none",
              display: "flex", flexDirection: "column",
              padding: sidebarOpen ? "16px 12px" : "0", gap: 8,
              transition: "width 0.25s cubic-bezier(0.4,0,0.2,1), min-width 0.25s, padding 0.2s",
              flexShrink: 0, height: "100vh",
            }}>

              {/* Logo */}
              <div style={{
                display: "flex", alignItems: "center", gap: 10,
                padding: "8px 8px 16px", borderBottom: `1px solid ${sidebarBorder}`, flexShrink: 0,
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 10, flexShrink: 0,
                  background: "linear-gradient(135deg,#1d4ed8 0%,#3b82f6 100%)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  boxShadow: "0 2px 8px rgba(37,99,235,0.35)",
                }}>
                  <GraduationCap size={20} color="#fff" />
                </div>
                <div style={{ overflow: "hidden" }}>
                  <div style={{ fontWeight: 700, fontSize: 16, color: textMain, whiteSpace: "nowrap" }}>{tx.logo}</div>
                  <div style={{ fontSize: 10, color: textMuted, marginTop: -1, whiteSpace: "nowrap" }}>{tx.tagline}</div>
                </div>
              </div>

              {/* New Chat */}
              <button style={{
                backgroundColor: "#2563eb", color: "#fff", border: "none",
                borderRadius: 10, padding: "10px 14px", fontFamily: tx.font,
                fontSize: 13, fontWeight: 600, cursor: "pointer",
                display: "flex", alignItems: "center", gap: 6, justifyContent: "center",
                marginTop: 4, flexShrink: 0,
                boxShadow: "0 2px 8px rgba(37,99,235,0.3)", whiteSpace: "nowrap",
              }}>
                <MessageSquarePlus size={16} />
                {tx.newChat}
              </button>

              {/* History */}
              <div style={{ marginTop: 8, flex: 1, overflowY: "auto", overflowX: "hidden" }}>
                <div style={{
                  fontSize: 10, fontWeight: 600, color: textMuted,
                  textTransform: "uppercase", letterSpacing: "0.08em",
                  padding: "4px 8px 8px", whiteSpace: "nowrap",
                }}>{tx.todayLabel}</div>
                {tx.history.map((item, i) => (
                  <div key={i} style={{
                    padding: "8px 12px", borderRadius: 8, cursor: "pointer",
                    fontSize: 13, color: textMuted,
                    display: "flex", alignItems: "center", gap: 8, transition: "all 0.15s",
                  }}
                  onMouseEnter={e => { e.currentTarget.style.backgroundColor = historyHover; e.currentTarget.style.color = textMain; }}
                  onMouseLeave={e => { e.currentTarget.style.backgroundColor = "transparent"; e.currentTarget.style.color = textMuted; }}
                  >
                    <MessageSquarePlus size={14} style={{ flexShrink: 0 }} />
                    <span style={{ flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item}</span>
                    <MoreHorizontal size={14} style={{ opacity: 0.4, flexShrink: 0 }} />
                  </div>
                ))}
              </div>

              {/* Bottom controls */}
              <div style={{
                flexShrink: 0, display: "flex", flexDirection: "column", gap: 8,
                paddingTop: 12, borderTop: `1px solid ${sidebarBorder}`,
              }}>
                {/* Theme + Language row */}
                <div style={{ display: "flex", gap: 8 }}>
                  <button onClick={() => setTheme(isDark ? "light" : "dark")} style={{
                    flex: 1, backgroundColor: ctrlBg, color: ctrlColor, border: "none",
                    borderRadius: 8, padding: "8px", cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    gap: 5, fontSize: 12, fontWeight: 500, fontFamily: tx.font, whiteSpace: "nowrap",
                  }}>
                    {isDark ? <Sun size={13} /> : <Moon size={13} />}
                    {isDark ? tx.themeLight : tx.themeDark}
                  </button>
                  <button onClick={() => setLang(lang === "ar" ? "en" : "ar")} style={{
                    flex: 1, backgroundColor: ctrlBg, color: ctrlColor, border: "none",
                    borderRadius: 8, padding: "8px", cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    gap: 5, fontSize: 12, fontWeight: 600, fontFamily: tx.font, whiteSpace: "nowrap",
                  }}>
                    <Globe size={13} />
                    {tx.switchLang}
                  </button>
                </div>

                {/* Auth row */}
                {isLoggedIn ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <div style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "8px 10px",
                      backgroundColor: accentBlueSoft, borderRadius: 9,
                      border: `1px solid ${isDark ? "#1d4ed830" : "#bfdbfe"}`,
                    }}>
                      <div style={{
                        width: 28, height: 28, borderRadius: "50%", flexShrink: 0,
                        background: "linear-gradient(135deg,#1d4ed8,#60a5fa)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}>
                        <User size={14} color="#fff" />
                      </div>
                      <span style={{ flex: 1, fontSize: 12, fontWeight: 600, color: accentBlueText, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {tx.loggedInAs}
                      </span>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button style={{
                        flex: 1, backgroundColor: ctrlBg, color: ctrlColor, border: "none",
                        borderRadius: 8, padding: "8px 6px", cursor: "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        gap: 5, fontSize: 11, fontWeight: 500, fontFamily: tx.font, whiteSpace: "nowrap",
                      }}>
                        <Settings size={13} />{tx.settingsBtn}
                      </button>
                      <button onClick={() => setIsLoggedIn(false)} style={{
                        flex: 1, backgroundColor: isDark ? "#2d1515" : "#fff1f2",
                        color: isDark ? "#f87171" : "#dc2626",
                        border: `1px solid ${isDark ? "#7f1d1d40" : "#fecaca"}`,
                        borderRadius: 8, padding: "8px 6px", cursor: "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        gap: 5, fontSize: 11, fontWeight: 600, fontFamily: tx.font, whiteSpace: "nowrap",
                      }}>
                        <LogOut size={13} />{tx.logoutBtn}
                      </button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => setIsLoggedIn(true)} style={{
                      flex: 1, backgroundColor: ctrlBg, color: ctrlColor, border: "none",
                      borderRadius: 8, padding: "9px 6px", cursor: "pointer",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      gap: 5, fontSize: 12, fontWeight: 500, fontFamily: tx.font, whiteSpace: "nowrap",
                    }}>
                      <LogIn size={13} />{tx.loginBtn}
                    </button>
                    <button onClick={() => setIsLoggedIn(true)} style={{
                      flex: 1, background: "linear-gradient(135deg,#1d4ed8,#3b82f6)",
                      color: "#fff", border: "none", borderRadius: 8, padding: "9px 6px",
                      cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                      gap: 5, fontSize: 12, fontWeight: 600, fontFamily: tx.font, whiteSpace: "nowrap",
                      boxShadow: "0 2px 6px rgba(37,99,235,0.3)",
                    }}>
                      <UserPlus size={13} />{tx.signupBtn}
                    </button>
                  </div>
                )}
              </div>
            </aside>
          </div>

          {/* ── MAIN AREA ── */}
          <main style={{
            flex: 1, display: "flex", flexDirection: "column",
            overflow: "hidden", backgroundColor: bg, minWidth: 0,
          }}>
            {/* Content */}
            <div style={{
              flex: 1, overflowY: "auto", padding: "40px 24px 20px",
              display: "flex", flexDirection: "column", alignItems: "center",
            }}>
              {/* Welcome block */}
              <div style={{ maxWidth: 700, width: "100%", textAlign: "center", marginBottom: 40 }}>
                <div style={{
                  width: 64, height: 64, borderRadius: 20,
                  background: "linear-gradient(135deg,#1d4ed8 0%,#60a5fa 100%)",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  margin: "0 auto 20px", boxShadow: "0 8px 24px rgba(37,99,235,0.35)",
                }}>
                  <GraduationCap size={30} color="#fff" />
                </div>
                <h1 style={{
                  fontSize: 28, fontWeight: 800, margin: "0 0 10px",
                  background: "linear-gradient(135deg,#1d4ed8,#3b82f6)",
                  WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text",
                }}>
                  {tx.welcomeTitle}
                </h1>
                <p style={{ fontSize: 15, color: textMuted, margin: 0, lineHeight: 1.6 }}>
                  {tx.welcomeSub} <strong style={{ color: accentBlue }}>19,000+</strong> {tx.welcomeSub2}
                </p>
              </div>

              {/* Services label */}
              <div style={{ maxWidth: 700, width: "100%", marginBottom: 16 }}>
                <p style={{ fontSize: 13, fontWeight: 600, color: textMuted, margin: 0, textAlign: lang === "ar" ? "right" : "left" }}>
                  {tx.servicesLabel}
                </p>
              </div>

              {/* Service cards grid */}
              <div style={{ maxWidth: 700, width: "100%", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {tx.services.map((svc, i) => {
                  const Ic = svc.icon;
                  const isLast = i === tx.services.length - 1 && tx.services.length % 2 !== 0;
                  return (
                    <div key={i} style={{
                      gridColumn: isLast ? "1 / -1" : undefined,
                      backgroundColor: cardBg, border: `1px solid ${cardBorder}`,
                      borderRadius: 12, padding: "14px 16px", cursor: "pointer",
                      display: "flex", alignItems: "center", gap: 12, transition: "all 0.15s",
                      boxShadow: isDark ? "none" : "0 1px 4px rgba(0,0,0,0.06)",
                    }}
                    onMouseEnter={e => {
                      e.currentTarget.style.borderColor = accentBlue;
                      e.currentTarget.style.boxShadow = "0 2px 12px rgba(37,99,235,0.15)";
                      e.currentTarget.style.transform = "translateY(-1px)";
                    }}
                    onMouseLeave={e => {
                      e.currentTarget.style.borderColor = cardBorder;
                      e.currentTarget.style.boxShadow = isDark ? "none" : "0 1px 4px rgba(0,0,0,0.06)";
                      e.currentTarget.style.transform = "none";
                    }}
                    >
                      <div style={{
                        width: 40, height: 40, borderRadius: 10, flexShrink: 0,
                        background: isDark
                          ? "linear-gradient(135deg,#1e3a8a 0%,#1d4ed8 100%)"
                          : "linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                      }}>
                        <Ic size={20} color={isDark ? "#93c5fd" : "#1d4ed8"} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 13, fontWeight: 700, color: textMain, marginBottom: 2 }}>{svc.label}</div>
                        <div style={{ fontSize: 11, color: textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{svc.desc}</div>
                      </div>
                      <ChevronRight size={14} color={textMuted}
                        style={{ transform: lang === "ar" ? "rotate(180deg)" : "none", flexShrink: 0 }} />
                    </div>
                  );
                })}
              </div>
            </div>

            {/* Input area */}
            <div style={{
              padding: "16px 24px 8px",
              borderTop: `1px solid ${isDark ? "#1e293b" : "#e2e8f0"}`,
              backgroundColor: isDark ? "#0d1117" : "#ffffff", flexShrink: 0,
            }}>
              <div style={{
                maxWidth: 700, margin: "0 auto", backgroundColor: inputBg,
                border: `1.5px solid ${inputBorder}`, borderRadius: 14,
                display: "flex", alignItems: "center", gap: 8, padding: "10px 14px",
                boxShadow: isDark ? "0 0 0 1px #334155" : "0 2px 8px rgba(0,0,0,0.08)",
              }}>
                <input type="text" placeholder={tx.inputPlaceholder} value={inputVal}
                  onChange={e => setInputVal(e.target.value)}
                  style={{
                    flex: 1, border: "none", outline: "none", backgroundColor: "transparent",
                    color: textMain, fontFamily: tx.font, fontSize: 14,
                    direction: tx.dir, textAlign: lang === "ar" ? "right" : "left",
                  }} />
                <button style={{
                  width: 36, height: 36, borderRadius: 10, flexShrink: 0, border: "none",
                  background: inputVal.length > 0
                    ? "linear-gradient(135deg,#1d4ed8,#3b82f6)"
                    : isDark ? "#1e293b" : "#f1f5f9",
                  cursor: inputVal.length > 0 ? "pointer" : "default",
                  display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s",
                }}>
                  <Send size={16} color={inputVal.length > 0 ? "#fff" : textMuted}
                    style={{ transform: lang === "ar" ? "rotate(180deg)" : "none" }} />
                </button>
              </div>
              <p style={{ textAlign: "center", fontSize: 10, color: textMuted, marginTop: 8, marginBottom: 0 }}>
                {tx.disclaimer}
              </p>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Homepage />);
  </script>
</body>
</html>
